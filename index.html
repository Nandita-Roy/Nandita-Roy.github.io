<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nandita Roy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F9F7F4;
      --ink:     #1A1A2E;
      --accent:  #C97B7B;
      --muted:   #8A8A9A;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .stage {
      position: relative;
      text-align: center;
      max-width: 520px;
    }

    /* large watermark initials */
    .stage::before {
      content: "NR";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(8rem, 30vw, 18rem);
      font-weight: 600;
      color: var(--accent);
      opacity: 0.06;
      pointer-events: none;
      user-select: none;
      letter-spacing: -0.04em;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.1;
      color: var(--ink);
    }

    .divider {
      width: 2.5rem;
      height: 1.5px;
      background: var(--accent);
      margin: 1.6rem auto;
    }

    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    footer {
      position: fixed;
      bottom: 1.8rem;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1>Nandita Roy</h1>
    <div class="divider"></div>
    <p>Something is on its way.<br>Check back soon.</p>
  </div>
  <footer>nandita-roy.github.io</footer>
</body>
</html>
